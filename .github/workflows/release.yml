name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Release version, for example v0.1.1"
        required: true
        type: string
      notes:
        description: "Release notes. Leave empty to use CHANGELOG.md."
        required: false
        type: string

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Validate version
        env:
          VERSION: ${{ inputs.version }}
        run: |
          if ! [[ "$VERSION" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Version must look like v0.1.1"
            exit 1
          fi

          if git rev-parse "$VERSION" >/dev/null 2>&1; then
            echo "Tag already exists: $VERSION"
            exit 1
          fi

      - name: Validate skills
        run: npm run validate

      - name: Build release notes
        env:
          VERSION: ${{ inputs.version }}
          RELEASE_NOTES: ${{ inputs.notes }}
        run: |
          if [ -n "$RELEASE_NOTES" ]; then
            printf '%s\n' "$RELEASE_NOTES" > /tmp/release-notes.md
          else
            awk '
              $0 == "## " version || $0 ~ "^## " version " - " {
                found=1
                next
              }
              found && /^## / {
                exit
              }
              found {
                print
              }
            ' version="$VERSION" CHANGELOG.md > /tmp/release-notes.md
          fi

          if ! grep -q '[^[:space:]]' /tmp/release-notes.md; then
            echo "SJinn skills release $VERSION." > /tmp/release-notes.md
          fi

      - name: Create tag
        env:
          VERSION: ${{ inputs.version }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -a "$VERSION" -F /tmp/release-notes.md
          git push origin "$VERSION"

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ inputs.version }}
        run: |
          gh release create "$VERSION" \
            --title "$VERSION" \
            --notes-file /tmp/release-notes.md
